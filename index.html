<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0E1A" />
    <script>
      (function () {
        var stored = localStorage.getItem("ms_lang");
        var lang = stored === "en" || stored === "pl" ? stored : null;
        if (!lang) {
          var browserLangs = navigator.languages || [navigator.language];
          lang = browserLangs.some(function (l) {
            return l.toLowerCase().indexOf("pl") === 0;
          })
            ? "pl"
            : "en";
        }
        document.documentElement.lang = lang;
        if (lang === "pl") {
          document.title = "Meow Strike — pobierz grę na Androida";
        }
      })();
    </script>
    <title>Meow Strike — download the game for Android</title>
    <meta
      name="description"
      content="Gather a team of cosmic cats and head for the stars together. Turn-based battles, campaign, coop and PvP online. Download Meow Strike free for Android."
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Meow Strike — download the game for Android" />
    <meta
      property="og:description"
      content="Gather a team of cosmic cats and head for the stars together. Turn-based battles, campaign, coop and PvP online."
    />
    <meta property="og:image" content="./app-icon.png" />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
